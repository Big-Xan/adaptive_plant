name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out as much as possible — the more detail you provide, the faster it can be diagnosed and fixed.

        Before submitting, please check:
        - [ ] This is reproducible and not a one-time glitch
        - [ ] You have restarted HA or reloaded the integration since the issue appeared
        - [ ] You have searched existing issues and this hasn't already been reported

  - type: input
    id: integration_version
    attributes:
      label: Adaptive Plant version
      placeholder: e.g. 1.2.0
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2025.5.0
    validations:
      required: true

  - type: input
    id: card_version
    attributes:
      label: Card version (if relevant)
      description: Check the first line of adaptive-plant-card.js or the browser console
      placeholder: e.g. v15

  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - HACS (custom repository)
        - Manual
    validations:
      required: true

  - type: dropdown
    id: affected_area
    attributes:
      label: What area is affected?
      multiple: true
      options:
        - Watering / adaptive logic
        - Fertilization
        - Repotting
        - Health / confirm health
        - Moisture sensor
        - Notes
        - Card / UI
        - Blueprint / notifications
        - Setup wizard / Configure
        - Entities missing or unavailable
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Set up a plant with...
        2. Press...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Go to Settings → System → Logs and filter for `adaptive_plant`.
        Include any errors or warnings related to the issue.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Plant configuration details, moisture sensor setup, screenshots, etc.
