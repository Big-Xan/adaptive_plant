name: Feature Request
description: Suggest something new for Adaptive Plant
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? I'd love to hear it. Feature requests directly shape what gets prioritized for the next release.

        Before submitting, please check:
        - [ ] This feature doesn't already exist (check the README and Configure options)
        - [ ] You have searched existing issues and this hasn't already been requested

  - type: dropdown
    id: area
    attributes:
      label: Which area does this relate to?
      multiple: true
      options:
        - Watering / adaptive logic
        - Fertilization
        - Repotting
        - Health tracking
        - Moisture sensor
        - Notes
        - Card / UI
        - Blueprint / notifications
        - Setup wizard / Configure
        - New optional feature
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What would you like to see?
      description: A clear description of the feature you're requesting.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve for you?
      description: Help me understand the use case — why would this be useful?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Have you found any workarounds?
      description: If you're currently working around this limitation, describe how.

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to your setup?
      options:
        - Nice to have
        - Would use it regularly
        - Would significantly improve my setup
        - Blocking me from using the integration fully
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Mockups, examples from other integrations, additional context, etc.
