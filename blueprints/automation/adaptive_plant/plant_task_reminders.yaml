blueprint:
  name: Adaptive Plant — Task Reminders
  description: >
    Sends a daily summary notification when plants have watering or fertilization
    tasks due or overdue. Up to three reminder times can be configured.

    Requires the Adaptive Plant integration (adaptive_plant). This blueprint
    discovers plants automatically using integration_entities('adaptive_plant')
    and filters by entity ID patterns generated by the integration
    (days_until_watering, days_until_fertiliz). Newly added plants are included
    automatically — use the exclusion inputs to opt specific plants out.

    Notification tag: adaptive_plant_task_reminder (replaces rather than stacks).
  domain: automation
  author: Big-Xan

  input:

    # ── Notification target ───────────────────────────────────────────────────
    notify_target:
      name: Notification target
      description: >
        The notify service to call. Enter the part after "notify." — e.g.
        mobile_app_your_phone. Find yours under Developer Tools → Actions,
        search "notify".
      selector:
        text:
          type: text

    # ── Reminder times ────────────────────────────────────────────────────────
    reminder_time_1:
      name: Reminder time (required)
      description: Primary daily reminder time.
      default: "08:00:00"
      selector:
        time:

    reminder_time_2:
      name: Second reminder time (optional)
      description: "Leave blank to disable. Only fires if tasks are still pending. Format: HH:MM or HH:MM:SS — e.g. 13:00 or 13:00:00 for 1:00 PM."
      default: ""
      selector:
        text:
          type: text

    reminder_time_3:
      name: Third reminder time (optional)
      description: "Leave blank to disable. Only fires if tasks are still pending. Format: HH:MM or HH:MM:SS — e.g. 18:00 or 18:00:00 for 6:00 PM."
      default: ""
      selector:
        text:
          type: text

    # ── Notification content ──────────────────────────────────────────────────
    notification_title:
      name: Notification title
      description: Title shown on the notification.
      default: "🌿 Plant Tasks"
      selector:
        text:
          type: text

    notification_message:
      name: Notification message
      description: >
        Base message text. If task detail is enabled below, the summary
        (e.g. "4 Waterings and 2 Fertilizations") is appended automatically.
      default: "You have plant tasks to tackle!"
      selector:
        text:
          type: text

    show_task_detail:
      name: Show task summary in notification
      description: >
        If enabled, appends a count of due/overdue tasks to the message,
        e.g. "You have plant tasks to tackle! — 4 Waterings and 2 Fertilizations"
      default: true
      selector:
        boolean:

    # ── Dashboard link ────────────────────────────────────────────────────────
    dashboard_url:
      name: Dashboard URL (optional)
      description: >
        If set, tapping the notification opens this URL. Use a relative path
        like /lovelace/plants or a full Nabu Casa URL for remote access.
        Leave blank to disable.
      default: ""
      selector:
        text:
          type: text

    # ── Fertilization ─────────────────────────────────────────────────────────
    enable_fertilization_reminders:
      name: Include fertilization reminders
      description: >
        If disabled, fertilization tasks are ignored entirely and only
        watering tasks trigger notifications.
      default: true
      selector:
        boolean:

    # ── Exclusions ────────────────────────────────────────────────────────────
    excluded_watering_plants:
      name: Exclude plants from watering reminders (optional)
      description: >
        Select any plants you want to exclude from watering reminders.
        All other plants are included automatically.
      default: []
      selector:
        device:
          integration: adaptive_plant
          multiple: true

    excluded_fertilization_plants:
      name: Exclude plants from fertilization reminders (optional)
      description: >
        Select any plants you want to exclude from fertilization reminders.
        All other plants are included automatically.
      default: []
      selector:
        device:
          integration: adaptive_plant
          multiple: true

variables:
  notify_target: !input notify_target
  notification_title: !input notification_title
  notification_message: !input notification_message
  show_task_detail: !input show_task_detail
  dashboard_url: !input dashboard_url
  enable_fertilization_reminders: !input enable_fertilization_reminders
  excluded_watering_plants: !input excluded_watering_plants
  excluded_fertilization_plants: !input excluded_fertilization_plants
  reminder_time_1: !input reminder_time_1
  reminder_time_2: !input reminder_time_2
  reminder_time_3: !input reminder_time_3

  watering_due_count: >
    {% set excluded_devices = excluded_watering_plants %}
    {% set ns = namespace(count=0) %}
    {% for entity in integration_entities('adaptive_plant') %}
      {% if 'days_until_watering' in entity %}
        {% set dev_id = device_id(entity) %}
        {% if dev_id not in excluded_devices %}
          {% set s = states(entity) %}
          {% if s in ('Today', '1 Day Overdue') or 'Days Overdue' in s %}
            {% set ns.count = ns.count + 1 %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.count }}

  fertilization_due_count: >
    {% if not enable_fertilization_reminders %}
      0
    {% else %}
      {% set excluded_devices = excluded_fertilization_plants %}
      {% set ns = namespace(count=0) %}
      {% for entity in integration_entities('adaptive_plant') %}
        {% if 'days_until_fertiliz' in entity %}
          {% set dev_id = device_id(entity) %}
          {% if dev_id not in excluded_devices %}
            {% set s = states(entity) %}
            {% if s in ('Today', '1 Day Overdue') or 'Days Overdue' in s %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endif %}
        {% endif %}
      {% endfor %}
      {{ ns.count }}
    {% endif %}

  total_due_count: "{{ (watering_due_count | int) + (fertilization_due_count | int) }}"

  task_detail: >
    {% set w = watering_due_count | int %}
    {% set f = fertilization_due_count | int %}
    {% if w > 0 and f > 0 %}
      {{ w }} Watering{{ 's' if w != 1 }} and {{ f }} Fertilization{{ 's' if f != 1 }}
    {% elif w > 0 %}
      {{ w }} Watering{{ 's' if w != 1 }}
    {% elif f > 0 %}
      {{ f }} Fertilization{{ 's' if f != 1 }}
    {% else %}
      
    {% endif %}

  full_message: >
    {% if show_task_detail and task_detail | trim != '' %}
      {{ notification_message }} — {{ task_detail | trim }}
    {% else %}
      {{ notification_message }}
    {% endif %}

trigger:
  - platform: time
    at: !input reminder_time_1
    id: time_1
  - platform: time_pattern
    minutes: "*"
    id: time_check

condition:
  - condition: template
    value_template: >
      {% set now_str = now().strftime('%H:%M') %}
      {% set t2 = reminder_time_2 | trim | truncate(5, false, '') %}
      {% set t3 = reminder_time_3 | trim | truncate(5, false, '') %}
      {% if trigger.id == 'time_1' %}
        true
      {% elif trigger.id == 'time_check' %}
        {{ (t2 != '' and now_str == t2) or (t3 != '' and now_str == t3) }}
      {% else %}
        false
      {% endif %}
  - condition: template
    value_template: "{{ total_due_count | int > 0 }}"

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ dashboard_url | trim != '' }}"
        sequence:
          - action: "notify.{{ notify_target }}"
            data:
              title: "{{ notification_title }}"
              message: "{{ full_message | trim }}"
              data:
                tag: adaptive_plant_task_reminder
                url: "{{ dashboard_url }}"
                clickAction: "{{ dashboard_url }}"
    default:
      - action: "notify.{{ notify_target }}"
        data:
          title: "{{ notification_title }}"
          message: "{{ full_message | trim }}"
          data:
            tag: adaptive_plant_task_reminder

mode: single
